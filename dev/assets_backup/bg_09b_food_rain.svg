<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 860" width="860" height="860">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#18141a"/>
      <stop offset="100%" stop-color="#0a080c"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bigGlow"><feGaussianBlur stdDeviation="15"/></filter>
    <radialGradient id="rainAmbient" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ff9900" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff7700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="860" height="860" fill="url(#bg)"/>
  <!-- Rain ambient glow from top -->
  <circle cx="430" cy="150" r="350" fill="url(#rainAmbient)" filter="url(#bigGlow)"/>
  <!-- Faint grid -->
  <g stroke="#2a2028" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="86" x2="860" y2="86"/><line x1="0" y1="172" x2="860" y2="172"/>
    <line x1="0" y1="258" x2="860" y2="258"/><line x1="0" y1="344" x2="860" y2="344"/>
    <line x1="0" y1="430" x2="860" y2="430"/><line x1="0" y1="516" x2="860" y2="516"/>
    <line x1="0" y1="602" x2="860" y2="602"/><line x1="0" y1="688" x2="860" y2="688"/>
    <line x1="0" y1="774" x2="860" y2="774"/>
    <line x1="86" y1="0" x2="86" y2="860"/><line x1="172" y1="0" x2="172" y2="860"/>
    <line x1="258" y1="0" x2="258" y2="860"/><line x1="344" y1="0" x2="344" y2="860"/>
    <line x1="430" y1="0" x2="430" y2="860"/><line x1="516" y1="0" x2="516" y2="860"/>
    <line x1="602" y1="0" x2="602" y2="860"/><line x1="688" y1="0" x2="688" y2="860"/>
    <line x1="774" y1="0" x2="774" y2="860"/>
  </g>
  <!-- Falling food orbs - various sizes and positions, with falling animation -->
  <!-- Row 1 - top (just appeared) -->
  <g filter="url(#glow)">
    <circle cx="120" cy="80" r="7" fill="#ff4444" opacity="0.8">
      <animate attributeName="cy" values="-20;860" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0.8;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="60" r="6" fill="#ff4444" opacity="0.7">
      <animate attributeName="cy" values="-20;860" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0;0.7;0.7;0" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="450" cy="40" r="8" fill="#ff4444" opacity="0.9">
      <animate attributeName="cy" values="-20;860" dur="4.5s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="4.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="620" cy="70" r="6.5" fill="#ff4444" opacity="0.75">
      <animate attributeName="cy" values="-20;860" dur="3.8s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0;0.75;0.75;0" dur="3.8s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="770" cy="50" r="7.5" fill="#ff4444" opacity="0.85">
      <animate attributeName="cy" values="-20;860" dur="4.2s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="opacity" values="0;0.85;0.85;0" dur="4.2s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
  </g>
  <!-- Row 2 - staggered -->
  <g filter="url(#glow)">
    <circle cx="200" cy="100" r="5.5" fill="#ff4444" opacity="0.6">
      <animate attributeName="cy" values="-20;860" dur="3.2s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0;0.6;0.6;0" dur="3.2s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="380" cy="90" r="7" fill="#ff4444" opacity="0.8">
      <animate attributeName="cy" values="-20;860" dur="4.8s" repeatCount="indefinite" begin="2.5s"/>
      <animate attributeName="opacity" values="0;0.8;0.8;0" dur="4.8s" repeatCount="indefinite" begin="2.5s"/>
    </circle>
    <circle cx="540" cy="110" r="6" fill="#ff4444" opacity="0.7">
      <animate attributeName="cy" values="-20;860" dur="3.6s" repeatCount="indefinite" begin="3s"/>
      <animate attributeName="opacity" values="0;0.7;0.7;0" dur="3.6s" repeatCount="indefinite" begin="3s"/>
    </circle>
    <circle cx="700" cy="85" r="8" fill="#ff4444" opacity="0.85">
      <animate attributeName="cy" values="-20;860" dur="5s" repeatCount="indefinite" begin="3.5s"/>
      <animate attributeName="opacity" values="0;0.85;0.85;0" dur="5s" repeatCount="indefinite" begin="3.5s"/>
    </circle>
  </g>
  <!-- Static food orbs already on ground (collected) -->
  <g opacity="0.35">
    <circle cx="150" cy="650" r="6" fill="#ff4444" filter="url(#glow)"/>
    <circle cx="300" cy="720" r="5" fill="#ff4444" filter="url(#glow)"/>
    <circle cx="500" cy="680" r="7" fill="#ff4444" filter="url(#glow)"/>
    <circle cx="680" cy="740" r="5.5" fill="#ff4444" filter="url(#glow)"/>
    <circle cx="400" cy="780" r="6" fill="#ff4444" filter="url(#glow)"/>
    <circle cx="600" cy="760" r="4.5" fill="#ff4444" filter="url(#glow)"/>
    <circle cx="250" cy="790" r="5" fill="#ff4444" filter="url(#glow)"/>
  </g>
  <!-- Golden rain cloud indicator at top -->
  <g transform="translate(430, 80)" opacity="0.3">
    <ellipse cx="0" cy="0" rx="80" ry="35" fill="#2a2018" stroke="#ff9900" stroke-width="1.5" filter="url(#glow)"/>
    <!-- Cloud inner glow -->
    <ellipse cx="0" cy="0" rx="60" ry="22" fill="#ff9900" opacity="0.1" filter="url(#bigGlow)"/>
    <!-- Rain drops below cloud -->
    <g stroke="#ff9900" stroke-width="1.5" opacity="0.5" stroke-linecap="round">
      <line x1="-40" y1="30" x2="-45" y2="50"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="1s" repeatCount="indefinite"/></line>
      <line x1="-15" y1="35" x2="-20" y2="55"><animate attributeName="opacity" values="0.5;0.8;0.5" dur="0.8s" repeatCount="indefinite" begin="0.2s"/></line>
      <line x1="10" y1="30" x2="5" y2="50"><animate attributeName="opacity" values="0.3;0.6;0.3" dur="1.2s" repeatCount="indefinite" begin="0.4s"/></line>
      <line x1="35" y1="35" x2="30" y2="55"><animate attributeName="opacity" values="0.4;0.7;0.4" dur="0.9s" repeatCount="indefinite" begin="0.6s"/></line>
    </g>
  </g>
  <!-- Small snake at bottom, happy -->
  <g filter="url(#glow)" opacity="0.55" transform="translate(350, 500)">
    <rect x="0" y="0" width="26" height="26" rx="4" fill="#1aff5a" opacity="0.7"/>
    <rect x="26" y="0" width="26" height="26" rx="4" fill="#1aff5a" opacity="0.8"/>
    <rect x="52" y="0" width="26" height="26" rx="4" fill="#14cc48" opacity="0.7"/>
    <rect x="78" y="0" width="26" height="26" rx="4" fill="#0fa83a" opacity="0.6"/>
    <!-- Eyes -->
    <circle cx="82" cy="10" r="4" fill="white" opacity="0.9"/>
    <circle cx="83" cy="9" r="2" fill="#111"/>
    <circle cx="96" cy="10" r="4" fill="white" opacity="0.9"/>
    <circle cx="97" cy="9" r="2" fill="#111"/>
  </g>
  <!-- Floating sparkle particles -->
  <g fill="#ff9900" opacity="0.3" filter="url(#glow)">
    <circle cx="100" cy="400" r="2"><animate attributeName="cy" values="400;380;400" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="300" r="1.8"><animate attributeName="cy" values="300;285;300" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="430" cy="600" r="2.2"><animate attributeName="cy" values="600;588;600" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="500" r="1.5"><animate attributeName="cy" values="500;490;500" dur="2.8s" repeatCount="indefinite"/></circle>
  </g>
</svg>