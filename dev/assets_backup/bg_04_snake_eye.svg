<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 860" width="860" height="860">
  <defs>
    <radialGradient id="bg" cx="45%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#1a2a18"/>
      <stop offset="60%" stop-color="#0e1a0e"/>
      <stop offset="100%" stop-color="#060a06"/>
    </radialGradient>
    <radialGradient id="iris" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="40%" stop-color="#cc9900"/>
      <stop offset="100%" stop-color="#664400"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1aff5a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1aff5a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bigGlow"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="scales"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>
  <rect width="860" height="860" fill="url(#bg)"/>
  <!-- Scale texture pattern -->
  <g opacity="0.04" filter="url(#scales)">
    <path d="M 0,0 Q 30,15 0,30 Q -30,15 0,0" fill="#1aff5a" transform="translate(100,100)"/>
    <path d="M 0,0 Q 30,15 0,30 Q -30,15 0,0" fill="#1aff5a" transform="translate(140,100)"/>
    <path d="M 0,0 Q 30,15 0,30 Q -30,15 0,0" fill="#1aff5a" transform="translate(120,130)"/>
    <path d="M 0,0 Q 30,15 0,30 Q -30,15 0,0" fill="#1aff5a" transform="translate(650,80)"/>
    <path d="M 0,0 Q 30,15 0,30 Q -30,15 0,0" fill="#1aff5a" transform="translate(690,80)"/>
    <path d="M 0,0 Q 30,15 0,30 Q -30,15 0,0" fill="#1aff5a" transform="translate(670,110)"/>
    <path d="M 0,0 Q 30,15 0,30 Q -30,15 0,0" fill="#1aff5a" transform="translate(80,600)"/>
    <path d="M 0,0 Q 30,15 0,30 Q -30,15 0,0" fill="#1aff5a" transform="translate(120,600)"/>
    <path d="M 0,0 Q 30,15 0,30 Q -30,15 0,0" fill="#1aff5a" transform="translate(100,630)"/>
    <path d="M 0,0 Q 30,15 0,30 Q -30,15 0,0" fill="#1aff5a" transform="translate(720,550)"/>
    <path d="M 0,0 Q 30,15 0,30 Q -30,15 0,0" fill="#1aff5a" transform="translate(760,550)"/>
    <path d="M 0,0 Q 30,15 0,30 Q -30,15 0,0" fill="#1aff5a" transform="translate(740,580)"/>
    <path d="M 0,0 Q 30,15 0,30 Q -30,15 0,0" fill="#1aff5a" transform="translate(200,750)"/>
    <path d="M 0,0 Q 30,15 0,30 Q -30,15 0,0" fill="#1aff5a" transform="translate(240,750)"/>
  </g>
  <!-- Big eye glow behind -->
  <circle cx="420" cy="410" r="250" fill="url(#eyeGlow)" filter="url(#bigGlow)"/>
  <!-- Eye outer shape (slightly tilted diamond/eye-shape) -->
  <g transform="translate(430, 410)">
    <!-- Outer eye -->
    <ellipse cx="0" cy="0" rx="200" ry="120" fill="#0d3320" stroke="#1a6640" stroke-width="3" filter="url(#glow)" opacity="0.8"/>
    <!-- Inner eye area -->
    <ellipse cx="0" cy="0" rx="160" ry="95" fill="#0a2618"/>
    <!-- Iris -->
    <circle cx="0" cy="0" r="70" fill="url(#iris)" filter="url(#glow)"/>
    <!-- Iris detail rings -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#aa8800" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#ccaa00" stroke-width="0.5" opacity="0.2"/>
    <!-- Iris radial lines -->
    <g stroke="#997700" stroke-width="0.5" opacity="0.15">
      <line x1="0" y1="-70" x2="0" y2="-30"/>
      <line x1="0" y1="70" x2="0" y2="30"/>
      <line x1="-70" y1="0" x2="-30" y2="0"/>
      <line x1="70" y1="0" x2="30" y2="0"/>
      <line x1="-50" y1="-50" x2="-20" y2="-20"/>
      <line x1="50" y1="-50" x2="20" y2="-20"/>
      <line x1="-50" y1="50" x2="-20" y2="20"/>
      <line x1="50" y1="50" x2="20" y2="20"/>
    </g>
    <!-- Pupil (vertical slit) -->
    <ellipse cx="0" cy="0" rx="12" ry="48" fill="#050505"/>
    <!-- Highlight reflection -->
    <ellipse cx="-22" cy="-18" rx="14" ry="10" fill="white" opacity="0.7"/>
    <ellipse cx="-18" cy="-22" rx="6" ry="4" fill="white" opacity="0.9"/>
    <!-- Small secondary highlight -->
    <circle cx="25" cy="20" r="5" fill="white" opacity="0.25"/>
  </g>
  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="black" stop-opacity="0"/>
    <stop offset="100%" stop-color="black" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="860" height="860" fill="url(#vignette)"/>
</svg>