<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 860" width="860" height="860">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#14101e"/>
      <stop offset="100%" stop-color="#08060c"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bigGlow"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="portalGlow"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="portalG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc44ff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#9933ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6600cc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="860" height="860" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#2a1848" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="86" x2="860" y2="86"/><line x1="0" y1="172" x2="860" y2="172"/>
    <line x1="0" y1="258" x2="860" y2="258"/><line x1="0" y1="344" x2="860" y2="344"/>
    <line x1="0" y1="430" x2="860" y2="430"/><line x1="0" y1="516" x2="860" y2="516"/>
    <line x1="0" y1="602" x2="860" y2="602"/><line x1="0" y1="688" x2="860" y2="688"/>
    <line x1="0" y1="774" x2="860" y2="774"/>
    <line x1="86" y1="0" x2="86" y2="860"/><line x1="172" y1="0" x2="172" y2="860"/>
    <line x1="258" y1="0" x2="258" y2="860"/><line x1="344" y1="0" x2="344" y2="860"/>
    <line x1="430" y1="0" x2="430" y2="860"/><line x1="516" y1="0" x2="516" y2="860"/>
    <line x1="602" y1="0" x2="602" y2="860"/><line x1="688" y1="0" x2="688" y2="860"/>
    <line x1="774" y1="0" x2="774" y2="860"/>
  </g>
  <!-- Portal frame glow -->
  <rect x="20" y="20" width="820" height="820" rx="4" fill="none" stroke="#9933ff" stroke-width="16" opacity="0.12" filter="url(#bigGlow)"/>
  <rect x="28" y="28" width="804" height="804" rx="2" fill="none" stroke="#bb66ff" stroke-width="4" opacity="0.25"/>
  <rect x="28" y="28" width="804" height="804" rx="2" fill="none" stroke="#dd99ff" stroke-width="1.5" opacity="0.15"/>
  <!-- Corner vortex swirls -->
  <g filter="url(#portalGlow)">
    <circle cx="28" cy="28" r="30" fill="url(#portalG)" opacity="0.6"/>
    <circle cx="832" cy="28" r="30" fill="url(#portalG)" opacity="0.6"/>
    <circle cx="28" cy="832" r="30" fill="url(#portalG)" opacity="0.6"/>
    <circle cx="832" cy="832" r="30" fill="url(#portalG)" opacity="0.6"/>
  </g>
  <!-- Corner rotating dots -->
  <g fill="#cc77ff" opacity="0.5">
    <g transform="translate(28,28)"><circle r="2"><animateMotion dur="3s" repeatCount="indefinite" path="M 0,-15 A 15,15 0 1,1 -15,0 A 15,15 0 1,1 0,15 A 15,15 0 1,1 15,0 A 15,15 0 1,1 0,-15"/></circle></g>
    <g transform="translate(832,28)"><circle r="2"><animateMotion dur="3s" repeatCount="indefinite" begin="0.75s" path="M 0,-15 A 15,15 0 1,1 -15,0 A 15,15 0 1,1 0,15 A 15,15 0 1,1 15,0 A 15,15 0 1,1 0,-15"/></circle></g>
    <g transform="translate(28,832)"><circle r="2"><animateMotion dur="3s" repeatCount="indefinite" begin="1.5s" path="M 0,-15 A 15,15 0 1,1 -15,0 A 15,15 0 1,1 0,15 A 15,15 0 1,1 15,0 A 15,15 0 1,1 0,-15"/></circle></g>
    <g transform="translate(832,832)"><circle r="2"><animateMotion dur="3s" repeatCount="indefinite" begin="2.25s" path="M 0,-15 A 15,15 0 1,1 -15,0 A 15,15 0 1,1 0,15 A 15,15 0 1,1 15,0 A 15,15 0 1,1 0,-15"/></circle></g>
  </g>
  <!-- Snake half-visible on left, emerging from portal -->
  <g filter="url(#glow)" opacity="0.7">
    <rect x="40" y="420" width="32" height="32" rx="5" fill="#1aff5a" opacity="0.6"/>
    <rect x="8" y="420" width="32" height="32" rx="5" fill="#1aff5a" opacity="0.35"/>
    <rect x="-24" y="420" width="32" height="32" rx="5" fill="#1aff5a" opacity="0.15"/>
    <rect x="72" y="420" width="30" height="30" rx="4" fill="#14cc48" opacity="0.7"/>
    <rect x="102" y="420" width="28" height="28" rx="4" fill="#0fa83a" opacity="0.6"/>
    <rect x="130" y="420" width="26" height="26" rx="3" fill="#0a8830" opacity="0.5"/>
  </g>
  <!-- Snake half-visible on right -->
  <g filter="url(#glow)" opacity="0.7">
    <rect x="790" y="420" width="32" height="32" rx="5" fill="#1aff5a" opacity="0.6"/>
    <rect x="822" y="420" width="32" height="32" rx="5" fill="#1aff5a" opacity="0.35"/>
    <rect x="854" y="420" width="32" height="32" rx="5" fill="#1aff5a" opacity="0.15"/>
    <rect x="758" y="420" width="30" height="30" rx="4" fill="#14cc48" opacity="0.7"/>
    <rect x="728" y="420" width="28" height="28" rx="4" fill="#0fa83a" opacity="0.6"/>
    <rect x="700" y="420" width="26" height="26" rx="3" fill="#0a8830" opacity="0.5"/>
  </g>
  <!-- Portal energy dots flowing along edges -->
  <g fill="#bb77ff" opacity="0.5" filter="url(#glow)">
    <circle r="2.5"><animateMotion dur="6s" repeatCount="indefinite" path="M 28,28 L 832,28"/></circle>
    <circle r="2.5"><animateMotion dur="6s" repeatCount="indefinite" begin="1.5s" path="M 832,28 L 832,832"/></circle>
    <circle r="2.5"><animateMotion dur="6s" repeatCount="indefinite" begin="3s" path="M 832,832 L 28,832"/></circle>
    <circle r="2.5"><animateMotion dur="6s" repeatCount="indefinite" begin="4.5s" path="M 28,832 L 28,28"/></circle>
  </g>
  <!-- Food orbs -->
  <circle cx="430" cy="250" r="28" fill="#ff3b3b" opacity="0.08" filter="url(#bigGlow)"/>
  <circle cx="430" cy="250" r="8" fill="#ff4444" opacity="0.6" filter="url(#glow)"/>
  <circle cx="300" cy="600" r="22" fill="#ff3b3b" opacity="0.06" filter="url(#bigGlow)"/>
  <circle cx="300" cy="600" r="6" fill="#ff4444" opacity="0.5" filter="url(#glow)"/>
</svg>